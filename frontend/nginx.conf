server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # El shell de la SPA cambia en cada despliegue y no debe quedar cacheado.
    # Los assets con hash conservan su cache inmutable en el bloque siguiente.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    # SPA fallback — todas las rutas no encontradas devuelven index.html.
    # Aplicamos la misma politica a / y a las rutas del cliente (/login, etc.).
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    # Cache agresivo para assets con hash en el nombre (generados por Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
